server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — single-page apps need this so client routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Phase 3: enable this block to proxy /api to the backend container.
    # The upstream name `backend` matches the docker-compose service name.
    #
    # location /api/ {
    #     proxy_pass         http://backend:8000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # Don't cache index.html — Vite emits hashed asset filenames, but the entry
    # document should always be revalidated.
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
